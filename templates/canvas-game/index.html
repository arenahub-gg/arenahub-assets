<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>RENAME ME — ArenaHub</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #14181c; color: #e8e6e3; font-family: system-ui, sans-serif; }
      #app { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 12px; }
      #game-frame { width: min(92vmin, 640px); }
      #game-stage { position: relative; width: 100%; aspect-ratio: 1; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-frame">
        <div id="game-stage"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
